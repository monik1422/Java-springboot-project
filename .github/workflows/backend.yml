name: Deploy Backend (self-hosted + OIDC)

# Runs on the self-hosted runner installed on the EC2 box.
on:
  # push:
  #   branches: [ main ]
  workflow_dispatch:   # ✅ manual trigger only

# OIDC: the job mints a short-lived token GitHub -> AWS STS. No stored keys.
permissions:
  id-token: write      # required to request the OIDC token
  contents: read       # required for actions/checkout

env:
  AWS_REGION: ${{ vars.AWS_REGION }}            # repo Variable, e.g. us-east-1
  DB_SECRET_NAME: ${{ vars.DB_SECRET_NAME }}    # repo Variable, e.g. datastore/db
  DEPLOY_DIR: /home/ec2-user/app/backend
  JAR_NAME: datastore-0.0.7.jar
  APP_PORT: "8084"

jobs:
  build-deploy:
    runs-on: self-hosted          # <-- runs ON the EC2 instance, no SSH/key pair
    steps:
      # 1) Pull the repo into the runner's workspace.
      - name: Checkout
        uses: actions/checkout@v4

      # 2) Assume the AWS role via OIDC (no access keys anywhere).
      #    Sets temporary AWS_* env vars for the steps that follow.
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}   # repo Variable (role ARN)
          aws-region: ${{ env.AWS_REGION }}

      # 3) Build the Spring Boot fat jar.
      - name: Build jar
        run: |
          cd backend
          mvn clean package -DskipTests -U

      # 4) Copy the jar to a stable path (the runner workspace is wiped between
      #    runs, so systemd must point somewhere permanent).
      - name: Deploy jar to stable path
        run: |
          mkdir -p "$DEPLOY_DIR"
          cp "backend/target/${JAR_NAME}" "${DEPLOY_DIR}/${JAR_NAME}"

      # 5) Fetch DB creds from Secrets Manager (using the OIDC role) and write
      #    them to a root-owned, chmod 600 EnvironmentFile for systemd.
      - name: Fetch DB credentials from Secrets Manager
        run: |
          sudo dnf install -y jq >/dev/null 2>&1 || true
          SECRET_JSON=$(aws secretsmanager get-secret-value \
            --secret-id "$DB_SECRET_NAME" \
            --query SecretString --output text)
          MYSQL_HOST=$(echo "$SECRET_JSON" | jq -r '.MYSQL_HOST')
          MYSQL_USERNAME=$(echo "$SECRET_JSON" | jq -r '.MYSQL_USERNAME')
          MYSQL_PASSWORD=$(echo "$SECRET_JSON" | jq -r '.MYSQL_PASSWORD')
          echo "::add-mask::$MYSQL_PASSWORD"
          sudo mkdir -p /var/log/app
          sudo chown ec2-user:ec2-user /var/log/app
          sudo tee /etc/datastore.env >/dev/null <<EOF
          MYSQL_HOST=${MYSQL_HOST}
          MYSQL_PORT=3306
          MYSQL_USERNAME=${MYSQL_USERNAME}
          MYSQL_PASSWORD=${MYSQL_PASSWORD}
          LOG_FILE_PATH=/var/log/app/datastore.log
          EOF
          sudo chown root:root /etc/datastore.env
          sudo chmod 600 /etc/datastore.env

      # 6) Install / refresh the systemd unit.
      - name: Install systemd unit
        run: |
          sudo tee /etc/systemd/system/datastore.service >/dev/null <<EOF
          [Unit]
          Description=DataStore Spring Boot Backend
          After=network.target

          [Service]
          User=ec2-user
          WorkingDirectory=${DEPLOY_DIR}
          EnvironmentFile=/etc/datastore.env
          ExecStart=/usr/bin/java -jar ${DEPLOY_DIR}/${JAR_NAME} --server.port=${APP_PORT}
          SuccessExitStatus=143
          Restart=always
          RestartSec=5
          StandardOutput=append:/var/log/app/datastore.out
          StandardError=append:/var/log/app/datastore.out

          [Install]
          WantedBy=multi-user.target
          EOF

      # 7) Reload, clear failed state, restart.
      - name: Reload & restart
        run: |
          sudo systemctl daemon-reload
          sudo systemctl enable datastore
          sudo systemctl reset-failed datastore || true
          sudo systemctl restart datastore

      # 8) Confirm the app reports healthy.
      - name: Health check
        run: |
          for i in $(seq 1 12); do
            H=$(curl -s "http://localhost:${APP_PORT}/actuator/health" || true)
            if [[ "$H" == *'"status":"UP"'* ]]; then echo "Application UP: $H"; exit 0; fi
            echo "Attempt $i: not up yet, retrying in 5s..."; sleep 5
          done
          echo "Application did not become healthy. Recent logs:"
          sudo systemctl status datastore --no-pager || true
          sudo tail -n 50 /var/log/app/datastore.out || true
          exit 1
