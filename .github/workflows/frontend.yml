name: Deploy Frontend (self-hosted)

# Runs on the self-hosted runner. No AWS calls, no secrets needed.
on:
  # push:
  #   branches: [ main ]
  workflow_dispatch:   # ✅ manual trigger only

env:
  DEPLOY_DIR: /home/ec2-user/app/frontend
  APP_PORT: "8501"
  API_URL: http://localhost:8084     # backend on the same EC2 host

jobs:
  deploy:
    # When chained off the backend run, only proceed if it succeeded.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1) Sync frontend code to a stable deploy dir (keep the venv across runs).
      - name: Sync frontend to deploy dir
        run: |
          sudo dnf install -y python3 python3-pip rsync >/dev/null 2>&1 || true
          mkdir -p "$DEPLOY_DIR"
          rsync -a --delete --exclude 'venv' frontend/ "$DEPLOY_DIR"/

      # 2) Create the venv (first run) and install/refresh dependencies.
      - name: Build venv & install deps
        run: |
          cd "$DEPLOY_DIR"
          [ -d venv ] || python3 -m venv venv
          ./venv/bin/pip install --upgrade pip
          ./venv/bin/pip install -r requirements.txt

      # 3) Install / refresh the systemd unit (robust python -m streamlit form).
      - name: Install systemd unit
        run: |
          sudo tee /etc/systemd/system/frontend.service >/dev/null <<EOF
          [Unit]
          Description=Streamlit Frontend App
          After=network.target

          [Service]
          User=ec2-user
          WorkingDirectory=${DEPLOY_DIR}
          ExecStart=${DEPLOY_DIR}/venv/bin/python -m streamlit run ${DEPLOY_DIR}/app.py --server.port=${APP_PORT} --server.address=0.0.0.0
          Environment=API_URL=${API_URL}
          Restart=always
          RestartSec=5
          StandardOutput=append:/home/ec2-user/frontend.log
          StandardError=append:/home/ec2-user/frontend-error.log

          [Install]
          WantedBy=multi-user.target
          EOF

      # 4) Reload, clear failed state, restart.
      - name: Reload & restart
        run: |
          sudo systemctl daemon-reload
          sudo systemctl enable frontend
          sudo systemctl reset-failed frontend || true
          sudo systemctl restart frontend

      # 5) Confirm the service is active.
      - name: Verify active
        run: |
          sleep 8
          if sudo systemctl is-active --quiet frontend; then
            echo "Frontend service is active."
          else
            echo "Frontend failed to start. Recent logs:"
            sudo systemctl status frontend --no-pager || true
            tail -n 50 /home/ec2-user/frontend-error.log || true
            exit 1
          fi
